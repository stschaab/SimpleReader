<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SimpleReader — Война и мир</title>
  <style>
    :root {
      --bg: #0f1115;
      --card: #171a21;
      --card-2: #1c212b;
      --text: #e8e8ea;
      --muted: #9aa0aa;
      --accent: #4f8cff;
      --accent-soft: rgba(79, 140, 255, 0.15);
      --border: #262b35;
      --level: #3a4150;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      padding: 0;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC",
        "Microsoft YaHei", "Noto Sans", sans-serif;
      min-height: 100vh;
    }

    .wrap {
      max-width: 900px;
      margin: 0 auto;
      padding: 1.5rem 1rem 3rem;
    }

    /* --- Buch-Kopf (später: Buchauswahl) --- */
    .book-head {
      display: flex;
      align-items: baseline;
      gap: 0.75rem;
      flex-wrap: wrap;
      margin-bottom: 1.25rem;
    }
    .book-head h1 {
      margin: 0;
      font-size: 1.4rem;
      letter-spacing: -0.01em;
    }
    .book-head .author {
      color: var(--muted);
      font-size: 0.9rem;
    }
    .badge {
      padding: 0.2rem 0.6rem;
      background: var(--accent-soft);
      color: var(--accent);
      border-radius: 999px;
      font-size: 0.72rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .part {
      color: var(--muted);
      font-size: 0.82rem;
      margin: -0.5rem 0 1.25rem;
    }

    /* --- Tabelle --- */
    .table-scroll {
      overflow-x: auto;
      border: 1px solid var(--border);
      border-radius: 12px;
      background: var(--card);
    }

    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 760px;
    }

    thead th {
      background: var(--card-2);
      color: var(--muted);
      font-size: 0.78rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      text-align: left;
      padding: 0.75rem 1rem;
      border-bottom: 1px solid var(--border);
      white-space: nowrap;
    }

    thead th .lvl {
      display: block;
      color: var(--accent);
      font-size: 0.68rem;
      margin-top: 2px;
      letter-spacing: 0.02em;
    }

    tbody td {
      padding: 1rem;
      vertical-align: top;
      border-bottom: 1px solid var(--border);
      font-size: 0.95rem;
      line-height: 1.55;
    }
    tbody tr:last-child td { border-bottom: none; }

    td.nr {
      color: var(--muted);
      font-variant-numeric: tabular-nums;
      white-space: nowrap;
    }

    td.original {
      font-size: 1.02rem;
      line-height: 1.7;
    }

    td.empty {
      color: var(--muted);
      text-align: center;
      font-size: 0.85rem;
    }
    td.empty .pill {
      display: inline-block;
      padding: 0.15rem 0.5rem;
      background: var(--level);
      border-radius: 6px;
      opacity: 0.7;
    }

    .note {
      margin-top: 1.25rem;
      color: var(--muted);
      font-size: 0.82rem;
      line-height: 1.5;
    }
  </style>
</head>
<body>
  <main class="wrap">
    <!-- Buch-Kopf -->
    <div class="book-head">
      <span class="badge">SimpleReader</span>
      <h1 id="book-title">…</h1>
      <span class="author" id="book-author"></span>
    </div>
    <p class="part" id="book-part"></p>

    <!-- Text-Tabelle (wird von app.js gefüllt) -->
    <div class="table-scroll">
      <table>
        <thead>
          <tr>
            <th>#</th>
            <th>Original <span class="lvl">Русский</span></th>
            <th>C1</th>
            <th>B2</th>
            <th>B1</th>
            <th>A2</th>
          </tr>
        </thead>
        <tbody id="paragraphs-body">
          <tr><td colspan="6" style="text-align:center;color:var(--muted);padding:2rem">Lade Text…</td></tr>
        </tbody>
      </table>
    </div>

    <p class="note" id="source-note"></p>
  </main>

  <!-- Daten und Logik -->
  <script src="data.js"></script>
  <script>
    (function () {
      const book = window.BOOK;
      if (!book) return;

      // Kopf füllen
      document.getElementById("book-title").textContent = book.meta.title;
      document.getElementById("book-author").textContent =
        book.meta.author + " · " + (book.meta.edition || "");
      document.getElementById("book-part").textContent = book.meta.part || "";

      // Tabelle füllen
      const body = document.getElementById("paragraphs-body");
      body.innerHTML = "";

      book.paragraphs.forEach(function (p) {
        const tr = document.createElement("tr");

        const tdNr = document.createElement("td");
        tdNr.className = "nr";
        tdNr.textContent = p.id;
        tr.appendChild(tdNr);

        const tdOrig = document.createElement("td");
        tdOrig.className = "original";
        tdOrig.textContent = p.original;
        tr.appendChild(tdOrig);

        ["C1", "B2", "B1", "A2"].forEach(function (lvl) {
          const td = document.createElement("td");
          td.className = "empty";
          if (p[lvl] && p[lvl].trim()) {
            td.className = "";
            td.textContent = p[lvl];
          } else {
            const pill = document.createElement("span");
            pill.className = "pill";
            pill.textContent = "folgt";
            td.appendChild(pill);
          }
          tr.appendChild(td);
        });

        body.appendChild(tr);
      });

      // Quellenhinweis
      document.getElementById("source-note").textContent =
        "Quelle: " + book.meta.source;
    })();
  </script>
</body>
</html>
